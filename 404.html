<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Error - Page Not Found</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .error-container {
            max-width: 400px;
        }

        .error-text {
            font-size: 24px;
            font-weight: bold;
            color: #ff0000;
            margin-bottom: 20px;
        }

        .instructions {
            font-size: 16px;
            color: #333333;
            margin-bottom: 20px;
        }

        .back-link {
            text-decoration: none;
            color: #007bff;
            font-weight: bold;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-text">404.. tota stran nea deluje!</div>
        <div class="instructions">
            Falil si ulico oz. kar državo. Gas nazaj!
        </div>
        <p>
            <a href="#" class="back-link">Go back</a>
        </p>
    </div>
</body>
</html>
