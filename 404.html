<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Not Found</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background-color: #f4f4f4;
      font-family: 'Arial', sans-serif;
    }

    .container {
      text-align: center;
    }

    h1 {
      font-size: 10em;
      margin: 0;
      color: #333;
    }

    p {
      font-size: 1.5em;
      color: #666;
    }

    .button {
      display: inline-block;
      padding: 10px 20px;
      margin-top: 20px;
      font-size: 1.2em;
      text-decoration: none;
      background-color: #3498db;
      color: #fff;
      border-radius: 5px;
      transition: background-color 0.3s ease;
    }

    .button:hover {
      background-color: #2980b9;
    }

    @keyframes heartbeat {
      0% {
        transform: scale(1);
      }
      25% {
        transform: scale(1.1);
      }
      50% {
        transform: scale(1);
      }
      75% {
        transform: scale(1.1);
      }
      100% {
        transform: scale(1);
      }
    }

    h1 {
      animation: heartbeat 1s infinite;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <p>Tota povezava nea deluje! Falil si ulico.. skoraj državo :o/p>
    <a href="#" class="button" onclick="goBack()">Gas Nazaj!</a>
  </div>

  <script>
    function goBack() {
      window.history.back();
    }
  </script>
</body>
</html>
