<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Error - Page Not Found</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .error-container {
            max-width: 400px;
            animation: bounce 2s infinite;
        }

        .error-text {
            font-size: 24px;
            font-weight: bold;
            color: #ff0000;
            margin-bottom: 20px;
            animation: shake 0.5s ease-in-out infinite;
        }

        .instructions {
            font-size: 16px;
            color: #333333;
            margin-bottom: 20px;
        }

        .shapes {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        .shape {
            width: 20px;
            height: 20px;
            background-color: #007bff;
            margin: 0 5px;
            border-radius: 50%;
            animation: pulse 1s infinite;
        }

        .back-link {
            text-decoration: none;
            color: #007bff;
            font-weight: bold;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-15px);
            }
            60% {
                transform: translateY(-10px);
            }
        }

        @keyframes shake {
            0%, 100% {
                transform: translateX(0);
            }
            10%, 30%, 50%, 70%, 90% {
                transform: translateX(-5px);
            }
            20%, 40%, 60%, 80% {
                transform: translateX(5px);
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-text">404.. tota povezava nea deluje!</div>
        <div class="instructions">
            Falil si ulico oz. kar državo. Gas nazaj!
        </div>
        <div class="shapes">
            <div class="shape"></div>
            <div class="shape"></div>
            <div class="shape"></div>
        </div>
        <p>
            <a href="#" class="back-link">Go back</a>
        </p>
    </div>
</body>
</html>
